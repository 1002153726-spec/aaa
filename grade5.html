<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجآت عطلة الربيع - الصف الخامس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            /* خلفية جديدة بألوان دافئة ومشرقة (برتقالي وأصفر) */
            background: radial-gradient(circle at top, #fffbeb, #ffedd5, #ffe4e6);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .box-container {
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .box-container:hover {
            transform: scale(1.05) translateY(-5px);
        }

        .gift-box {
            font-size: 4rem;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
            transition: all 0.3s ease;
        }

        /* حركة جديدة لفتح الصندوق (Tada) */
        @keyframes tada {
            0% { transform: scale(1); }
            10%, 20% { transform: scale(0.9) rotate(-3deg); }
            30%, 50%, 70%, 90% { transform: scale(1.2) rotate(3deg); }
            40%, 60%, 80% { transform: scale(1.2) rotate(-3deg); }
            100% { transform: scale(1) rotate(0); }
        }

        .tada-anim {
            animation: tada 0.8s ease-in-out;
        }

        .opened-box {
            filter: grayscale(30%) opacity(0.7);
            transform: scale(0.95);
        }

        .modal-enter {
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(50px) scale(0.8); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 25px -5px rgba(234, 88, 12, 0.15);
        }

        /* حركات الزينة المفعمة بالطاقة */
        @keyframes float-fast {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        @keyframes spin-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-float-fast { animation: float-fast 3s ease-in-out infinite; }
        .animate-float-delayed { animation: float-fast 4s ease-in-out infinite 1s; }
        .animate-spin-slow { animation: spin-slow 15s linear infinite; }

    </style>
</head>
<body class="text-gray-800 relative pb-20">

    <div class="fixed inset-0 pointer-events-none" style="background-image: radial-gradient(rgba(234,88,12,0.05) 2px, transparent 2px); background-size: 40px 40px; opacity: 0.6;"></div>

    <div class="container mx-auto px-4 pt-12 relative z-10">
        <header class="text-center mb-16 relative py-12 px-4 max-w-4xl mx-auto rounded-3xl bg-white/40 backdrop-blur-md border border-white/60 shadow-lg mt-8">
            
            <!-- زينة المغامرات والربيع للطلاب الأكبر سناً -->
            <div class="absolute -top-8 -right-4 md:-right-8 text-6xl animate-spin-slow opacity-90 drop-shadow-md z-20">☀️</div>
            <div class="absolute -top-6 -left-4 md:-left-8 text-5xl animate-float-fast opacity-90 drop-shadow-md z-20">✈️</div>
            <div class="absolute top-1/3 -right-6 md:-right-12 text-5xl animate-float-delayed opacity-90 drop-shadow-md z-20">🏕️</div>

            <div class="absolute -bottom-10 left-20 text-6xl animate-float-fast opacity-80 drop-shadow-md z-20">🌻</div>
            <div class="absolute -top-12 left-1/2 transform -translate-x-1/2 text-5xl animate-float-delayed opacity-90 drop-shadow-md z-20">🦅</div>
            <div class="absolute -bottom-8 left-1/2 transform -translate-x-1/2 text-4xl animate-float-fast opacity-90 drop-shadow-md z-20">🍦</div>

            <!-- النصوص والألوان الجديدة -->
            <h1 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 via-yellow-500 to-red-500 mb-6 py-4 leading-normal drop-shadow-sm relative z-10">
                إجازة ربيع سعيدة
            </h1>
            
            <h2 class="text-2xl md:text-4xl font-bold text-orange-700 mb-4 mt-2 drop-shadow-sm relative z-10">
                أبطال الصف الخامس
            </h2>
            <h3 class="text-xl md:text-2xl font-bold text-red-700 mb-8 drop-shadow-sm relative z-10">
                المدرسة الأبتدائية "ج" - نحف
            </h3>
            
            <div class="w-40 h-1 bg-gradient-to-r from-orange-300 via-yellow-400 to-red-300 mx-auto mb-8 rounded-full opacity-80"></div>
            
            <p class="text-xl md:text-2xl text-orange-900 font-semibold drop-shadow-sm mb-4 relative z-10">
                اضغط على رسالتك لتكتشف ماذا تخبئ لك الإجازة!
            </p>
            <p class="text-lg md:text-xl text-red-600 font-bold drop-shadow-sm relative z-10">
                مع تحيات: المعلمة امتثال سرحان
            </p>
        </header>

        <div id="studentsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <!-- الصناديق ستضاف هنا برمجياً -->
        </div>
    </div>

    <!-- نافذة الرسالة -->
    <div id="messageModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-orange-900 bg-opacity-40 backdrop-blur-sm">
        <div class="glass-panel w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-3xl p-6 md:p-8 text-center relative modal-enter shadow-2xl shadow-orange-200">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-gray-500 hover:text-orange-600 hover:bg-orange-100 p-2 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div class="text-6xl mb-4" id="modalEmoji">🌟</div>
            <h2 id="modalStudentName" class="text-3xl md:text-5xl font-bold text-orange-600 mb-6 drop-shadow-sm">اسم الطالب</h2>
            
            <div class="bg-gradient-to-r from-orange-50 to-yellow-50 rounded-2xl p-6 border border-orange-200 mb-6 shadow-inner text-right">
                <p id="modalStudentMessage" class="text-xl md:text-2xl leading-relaxed text-gray-800 font-semibold">
                    هنا تكتب الرسالة...
                </p>
            </div>
            
            <button onclick="closeModal()" class="mt-4 bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold py-3 px-10 rounded-full text-xl hover:scale-105 transition-transform shadow-lg shadow-orange-300">
                أراكم في الفصل الثالث 👋
            </button>
        </div>
    </div>

    <script>
        // قائمة طلاب الصف الخامس مع رسائل محفزة تناسب أعمارهم
        const students = [
            { name: "عبدالرحمن زياد احمد", gender: "M", message: "إجازة ربيع سعيدة! أتمنى أن تقضي وقتاً رائعاً وتعود بطاقة وإصرار أكبر لتحقيق التميز الذي اعتدت عليه. 🚀" },
            { name: "ناي شاكر ايوب", gender: "F", message: "عطلة ربيعية مليئة بالفرح والتألق. استمتعي بوقتك وعودي لنا بهمتك العالية وابتسامتك المشرقة! 🌸" },
            { name: "عبدالرحمن يامن ايوب", gender: "M", message: "أتمنى لك إجازة ممتعة ومغامرات شيقة. بانتظارك في الفصل القادم لتثبت قدراتك الرائعة وتفوقك! 🏆" },
            { name: "احمد مجيد اسماعيل", gender: "M", message: "عطلة ربيع دافئة وآمنة. استرح جيداً لأننا ننتظر منك إنجازات كبيرة وطموحات عالية في الفصل الثالث! ⭐" },
            { name: "قمر ناصر اسماعيل", gender: "F", message: "إجازة هادئة ومبهجة كحضورك. موعدنا بعد الإجازة لنستكمل معاً طريق النجاح والتميز! 🎀" },
            { name: "سامي عبدالرحمن اسماعيل", gender: "M", message: "عطلة مليئة بالأنشطة والمرح. أتمنى لك أوقاتاً جميلة وعودة قوية للمدرسة بكل عزيمة! ⚽" },
            { name: "عبدالغني أحمد اسماعيل", gender: "M", message: "استمتع بكل لحظة في هذه الإجازة. بانتظار عودتك مفعماً بالحيوية لتحقيق أهدافك القادمة! 🌟" },
            { name: "رؤيه محمد اسماعيل", gender: "F", message: "عطلة ربيع رائعة ومكللة بالسعادة. عودي إلينا بطاقتك الإيجابية وأفكارك المبدعة دائماً! 🎨" },
            { name: "محمد فادي حسين", gender: "M", message: "إجازة سعيدة وآمنة. أتمنى لك راحة تجدد نشاطك لتنطلق نحو القمة في الفصل الثالث! 🥇" },
            { name: "يحيى إبراهيم حسن", gender: "M", message: "عطلة ربيعية مميزة. استعد جيداً لأن القادم أجمل، ونحن نثق بقدراتك الكبيرة! 🎯" },
            { name: "عدي مرعي منصور", gender: "M", message: "أتمنى لك إجازة مليئة باللعب والفرح. نلتقي قريباً لنكمل رحلة التعلم بحماس وإصرار! 🚴" },
            { name: "خالد كمال نزال", gender: "M", message: "عطلة ربيع هادئة وممتعة. عد إلينا بطاقتك الرائعة وعزيمتك التي لا تلين! 🚀" },
            { name: "ليان فيصل نعيم", gender: "F", message: "إجازة ربيع سعيدة ومشرقة كطموحك. بانتظار مشاركاتك المميزة في الفصل القادم! ✨" },
            { name: "لينا فيصل نعيم", gender: "F", message: "عطلة جميلة ومريحة أتمناها لكِ. استعدي للعودة بنشاط وتألق كما عهدناكِ دائماً! 🌺" },
            { name: "أيهم نزية سواعد", gender: "M", message: "أتمنى لك أوقاتاً رائعة في الإجازة. بانتظار عودتك القوية لنحقق معاً المزيد من النجاحات! 🏆" },
            { name: "جود إسماعيل سواعد", gender: "F", message: "إجازة سعيدة ومكللة بالفرح. نلتقي في الفصل الثالث مع طموحات متجددة وعزيمة قوية! 🦋" },
            { name: "رسيل عقاب سواعد", gender: "F", message: "عطلة ربيعية دافئة وممتعة. عودي إلينا بروحك الجميلة لنستمر في مسيرة الإبداع! 🎨" },
            { name: "جواد نمر سعيد", gender: "M", message: "إجازة مليئة بالمغامرات الرائعة. عد لنا بهمتك العالية لتبدع في الفصل الثالث! ⛺" },
            { name: "ريته رشوان سعيد", gender: "F", message: "عطلة ربيع هادئة وجميلة. موعدنا بعد الإجازة لنتشارك أفكاراً جديدة وتألقاً مستمراً! 🌟" },
            { name: "نبأ رشاد صفدي", gender: "F", message: "إجازة سعيدة ومريحة أتمناها لكِ. بانتظار عودتك המشرقة لنحقق إنجازات رائعة! 🌷" },
            { name: "رنيم إبراهيم سرحان", gender: "F", message: "عطلة ربيعية مليئة بالسعادة. استعدي لفصل ثالث حافل بالنجاحات والتميز المستمر! 🎀" },
            { name: "محمد سامر عباس", gender: "M", message: "إجازة آمنة وممتعة. عد إلينا بحماس ونشاط لتثبت أنك دائماً قادر على التميز! ⚡" },
            { name: "عبدالوهاب ثائر عباس", gender: "M", message: "عطلة ربيع سعيدة. نلتقي في الفصل الثالث لنرسم معاً طريقاً جديداً من النجاح! 🎯" },
            { name: "خالد يحيى عبدالغني", gender: "M", message: "أتمنى لك إجازة رائعة ومريحة. بانتظارك لتبدع وتتألق في الفصل القادم! 🥇" },
            { name: "ابراهيم محمد عمر", gender: "M", message: "عطلة ربيعية مليئة بالفرح. عد إلينا بطاقتك المعتادة لتكون من المتميزين دائماً! 🚀" },
            { name: "حلا محمد قيس", gender: "F", message: "إجازة سعيدة ودافئة. بانتظار حضورك الجميل وتفوقك المستمر في الفصل الثالث! 🌸" },
            { name: "اسماعيل أسعد قيس", gender: "M", message: "عطلة ممتعة ومليئة بالنشاط. استعد للعودة بقوة وهمة عالية تعانق السماء! ⭐" },
            { name: "محمد مسعود شباط", gender: "M", message: "أتمنى لك إجازة ربيع هادئة ومميزة. نلتقي قريباً لنكمل معاً رحلة التميز والنجاح! 🏆" },
            { name: "شام بدر شباط", gender: "F", message: "إجازة ربيعية مشرقة ومبهجة. عودي إلينا بنشاطك وحيويتك لنحقق المزيد من الأهداف! 🌻" }
        ];

        const grid = document.getElementById('studentsGrid');
        // استخدام رموز رسائل وبريد مغلقة للتشويق
        const icons = ['💌', '📬', '📨', '📩', '🎫', '🎒']; 
        
        students.forEach((student, index) => {
            const randomIcon = icons[index % icons.length];
            
            const boxWrapper = document.createElement('div');
            boxWrapper.className = 'box-container flex flex-col items-center justify-center p-4 rounded-2xl glass-panel';
            boxWrapper.id = `box-${index}`;
            boxWrapper.onclick = () => openBox(index);
            
            boxWrapper.innerHTML = `
                <div class="gift-box mb-3" id="icon-${index}">${randomIcon}</div>
                <h3 class="text-xl md:text-2xl font-bold text-orange-900 text-center w-full drop-shadow-sm pb-2 border-b border-orange-200/50">
                    ${student.name}
                </h3>
                <span class="mt-2 text-xs text-red-700 font-bold bg-red-100/80 px-3 py-1 rounded-full opacity-0 transition-opacity border border-red-200" id="badge-${index}">تمت القراءة ✓</span>
            `;
            grid.appendChild(boxWrapper);
        });

        function openBox(index) {
            const boxWrapper = document.getElementById(`box-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            const badge = document.getElementById(`badge-${index}`);
            const student = students[index];

            if(boxWrapper.classList.contains('opened')) return;

            // استخدام تأثير Tada المليء بالطاقة
            icon.classList.add('tada-anim');

            setTimeout(() => {
                icon.classList.remove('tada-anim');
                icon.innerHTML = '✨'; 
                boxWrapper.classList.add('opened');
                boxWrapper.classList.add('opened-box');
                badge.classList.remove('opacity-0');
                
                fireConfetti();
                showModal(student.name, student.message, student.gender);
            }, 800);
        }

        function fireConfetti() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                // ألوان نارية ومبهجة تناسب الثيم (برتقالي، أصفر، أحمر، ذهبي)
                confetti({
                    particleCount: 5, angle: 60, spread: 55, origin: { x: 0 },
                    colors: ['#EA580C', '#F59E0B', '#EF4444', '#FCD34D'], shapes: ['star'], scalar: 1.2
                });
                confetti({
                    particleCount: 5, angle: 120, spread: 55, origin: { x: 1 },
                    colors: ['#F97316', '#EAB308', '#DC2626', '#FDE047'], shapes: ['circle'], scalar: 0.8
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        const modal = document.getElementById('messageModal');
        const modalName = document.getElementById('modalStudentName');
        const modalMessage = document.getElementById('modalStudentMessage');

        function showModal(name, message, gender) {
            const firstName = name.split(' ')[0];
            const prefix = gender === 'F' ? 'عزيزتي' : 'بطلنا'; // تغيير "عزيزي" إلى "بطلنا" لتشجيع الذكور
            
            modalName.textContent = name;
            
            modalMessage.innerHTML = `
                <span class="text-orange-600 font-black text-3xl mb-3 block">${prefix} ${firstName}،</span>
                <span class="text-gray-700 block mb-6">${message}</span>
                <span class="text-red-600 font-bold text-lg block border-t border-orange-100 pt-4 mt-2">
                    معلمتكم المحبة،<br>امتثال سرحان ☀️
                </span>
            `;
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });

    </script>
</body>
</html>
